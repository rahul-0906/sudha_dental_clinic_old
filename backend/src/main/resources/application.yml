spring:
  application:
    name: dental-clinic-management
  config:
    import:
      - "classpath:tenant-config.yml"
      - "optional:file:./tenant-config.yml"

  # PostgreSQL Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/sudhadentaldb
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: admin

  # JPA & Hibernate Settings
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: true
    properties:
      hibernate:
        format_sql: true

# White-Label Configuration Properties mapping
clinic:
  name: ${CLINIC_NAME:Sudha Dental Clinic}
  primary-color: ${CLINIC_PRIMARY_COLOR:#0f766e}
  secondary-color: ${CLINIC_SECONDARY_COLOR:#0d9488}
  email: ${CLINIC_EMAIL:info@sudhadentalclinic.com}
  phone: ${CLINIC_PHONE:+91 98765 43210}
  address: ${CLINIC_ADDRESS:Opposite Town Hall, Main Road, Cityville}
  whatsapp-enabled: ${CLINIC_WHATSAPP_ENABLED:false}

# Meta Cloud / WhatsApp API Configuration
meta:
  whatsapp:
    phone-number-id: ${META_WHATSAPP_PHONE_NUMBER_ID:1234567890}
    developer-token: ${META_WHATSAPP_DEVELOPER_TOKEN:EAAGxxxxxxxxxxxxxxxxxxxxxxxx}
    template-name: ${META_WHATSAPP_TEMPLATE_NAME:appointment_reminder}
    api-version: ${META_WHATSAPP_API_VERSION:v18.0}

# Server Setup
server:
  port: 8081
  error:
    include-message: always

# Logging Configurations
logging:
  level:
    com.sudhadental: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
